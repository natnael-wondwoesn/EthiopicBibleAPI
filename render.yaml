services:
  # Single free web service — runs both API + Telegram bot
  - type: web
    name: ethiopic-bible
    runtime: docker
    plan: free
    envVars:
      - key: MODE
        value: both
      - key: TELEGRAM_BOT_TOKEN
        sync: false  # set manually in Render dashboard
      - key: RENDER_EXTERNAL_URL
        fromService:
          name: ethiopic-bible
          type: web
          property: url
